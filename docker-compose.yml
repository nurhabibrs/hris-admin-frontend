services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_APP_NAME: ${VITE_APP_NAME:-HRIS Admin Company Manager}
        VITE_PORT: ${VITE_PORT:-4000}
    container_name: hris-admin-frontend
    ports:
      - "${VITE_PORT:-4000}:80"
    restart: unless-stopped
